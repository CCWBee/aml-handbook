{% extends "base.html" %}

{% block site_nav %}
  {{ super() }}
  <script>
    // Inject role badge at the top of the primary sidebar
    (function() {
      function inject() {
        var sidebar = document.querySelector('.md-sidebar--primary .md-sidebar__scrollwrap');
        if (!sidebar || document.getElementById('role-badge')) return;
        var wrap = document.createElement('div');
        wrap.style.cssText = 'padding: 0.5rem 0.6rem 0.4rem;';
        wrap.innerHTML = '<div style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.03em; color: var(--md-default-fg-color--light); margin-bottom: 0.2rem;">Viewing as:</div>'
          + '<a class="role-badge" id="role-badge" title="Click to change sector filter">All Sectors</a>';
        sidebar.insertBefore(wrap, sidebar.firstChild);
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', inject);
      else inject();
    })();
  </script>
{% endblock %}
